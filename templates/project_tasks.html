<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ project.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.min.css') }}">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    .card { transition: box-shadow 0.15s; }
    .card:active { box-shadow: 0 0 0 2px #6366f1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Sticky header -->
  <div class="sticky top-0 bg-white border-b border-gray-200 shadow-sm z-10">
    <div class="px-4 pt-3 pb-2 flex items-center justify-between gap-3">
      <div class="min-w-0">
        <div class="text-xs text-gray-400 font-medium uppercase tracking-wide">Task List</div>
        <h1 class="font-bold text-gray-800 text-lg leading-tight truncate">{{ project.name }}</h1>
      </div>
      <div id="progressChip"
           class="shrink-0 text-sm font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">
        {{ completed }}/{{ total }}
      </div>
    </div>
    <div class="h-2 bg-gray-100 mx-4 mb-3 rounded-full overflow-hidden">
      <div id="progressBar" class="h-2 bg-indigo-500 rounded-full transition-all"
           style="width: {{ ((completed / total * 100)|int) if total else 0 }}%"></div>
    </div>
  </div>

  <!-- Task list -->
  <div class="px-4 pt-4 pb-20 max-w-lg mx-auto" id="taskList"></div>

  <!-- Bottom safe area spacer for iOS -->
  <div style="height: env(safe-area-inset-bottom, 16px)"></div>

<script>
const PROJECT_ID = {{ project.id }};
const COLORS     = {{ colors | safe }};
let allProps     = {{ props_json | safe }};

const TASK_TYPES = [
  { code: "departure_clean", label: "Departure Clean" },
  { code: "arrival_inspect", label: "Arrival Inspection" },
  { code: "owner_turnover",  label: "Owner Turnover" },
  { code: "deep_clean",      label: "Deep Clean" },
  { code: "mid_stay",        label: "Mid-Stay Check" },
  { code: "maintenance",     label: "Maintenance" },
];
const TASK_TYPE_LABELS = Object.fromEntries(TASK_TYPES.map(t => [t.code, t.label]));

// tracks selected task type per card
const selectedType = {};

function render() {
  const pending   = allProps.filter(p => !p.completion_id);
  const completed = allProps.filter(p =>  p.completion_id);

  const clusters = {};
  pending.forEach(p => {
    const c = p.cluster ?? -1;
    if (!clusters[c]) clusters[c] = [];
    clusters[c].push(p);
  });

  let html = "";

  Object.keys(clusters).sort((a, b) => +a - +b).forEach(c => {
    const color = +c >= 0 ? COLORS[+c % COLORS.length] : "#9ca3af";
    const items = clusters[c];
    items.sort((a, b) => a.property_name.localeCompare(b.property_name));
    const label = +c >= 0 ? `Route ${+c + 1}` : "Unassigned";

    html += `
      <div class="mb-5">
        <div class="flex items-center gap-2 mb-2 px-1">
          <span style="background:${color}" class="w-2.5 h-2.5 rounded-full flex-shrink-0"></span>
          <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">${label}</span>
          <span class="text-xs text-gray-400">· ${items.length} stop${items.length === 1 ? "" : "s"}</span>
        </div>
        ${items.map(p => pendingCard(p, color)).join("")}
      </div>`;
  });

  if (completed.length) {
    html += `
      <div class="mb-5">
        <div class="flex items-center gap-2 mb-2 px-1">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">
            Completed · ${completed.length}
          </span>
        </div>
        ${completed.map(p => doneCard(p)).join("")}
      </div>`;
  }

  if (!html) {
    html = `<div class="text-center py-20 text-gray-400">
      <div class="text-5xl mb-3">✓</div>
      <div class="font-semibold text-gray-500">All done!</div>
    </div>`;
  }

  document.getElementById("taskList").innerHTML = html;
}

function pendingCard(p, regionColor) {
  return `
    <div class="card bg-white rounded-2xl border border-gray-100 shadow-sm mb-3 overflow-hidden" id="card-${p.id}">
      <div class="px-4 pt-4 pb-3 border-l-4" style="border-color:${regionColor}">
        <div class="font-semibold text-gray-800 text-base leading-snug">${p.property_name}</div>
        ${p.address ? `<div class="text-sm text-gray-400 mt-0.5">${p.address}</div>` : ""}
      </div>

      <div id="form-${p.id}" class="hidden px-4 pb-4 pt-3 bg-gray-50 border-t border-gray-100">
        <div class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Task type</div>
        <div class="grid grid-cols-3 gap-1.5 mb-3" id="typepicker-${p.id}">
          ${TASK_TYPES.map(t => `
            <button onclick="selectType(${p.id}, '${t.code}')"
                    id="type-${p.id}-${t.code}"
                    class="type-btn py-2 px-1 rounded-xl border text-xs font-semibold text-center
                           transition-colors border-gray-200 bg-white text-gray-600
                           active:scale-95"
                    data-prop="${p.id}" data-code="${t.code}">
              ${t.label}
            </button>`).join("")}
        </div>
        <input type="text" id="comment-${p.id}"
               placeholder="Add a note (optional)"
               class="w-full border border-gray-200 bg-white rounded-xl px-3 py-2.5 text-sm mb-3
                      focus:outline-none focus:ring-2 focus:ring-green-400">
        <div class="flex gap-2">
          <button onclick="submitComplete(${p.id})"
                  class="flex-1 bg-green-600 active:bg-green-700 text-white font-bold
                         py-3 rounded-xl text-sm transition-colors">
            ✓ Mark as Done
          </button>
          <button onclick="cancelForm(${p.id})"
                  class="px-5 py-3 text-gray-500 text-sm rounded-xl border border-gray-200 bg-white">
            Cancel
          </button>
        </div>
      </div>

      <button onclick="showForm(${p.id})"
              id="doneBtn-${p.id}"
              class="w-full border-t border-gray-100 py-3.5 text-sm font-bold
                     text-green-600 bg-green-50 active:bg-green-100 transition-colors text-center">
        Mark Done →
      </button>
    </div>`;
}

function doneCard(p) {
  const date = p.completed_at
    ? new Date(p.completed_at).toLocaleDateString("en-US",
        {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"})
    : "";
  const typeLabel = TASK_TYPE_LABELS[p.task_type] || "";
  return `
    <div class="bg-white rounded-2xl border border-gray-100 mb-2 px-4 py-3 flex items-start gap-3 opacity-50">
      <span class="text-green-500 text-xl mt-0.5 flex-shrink-0">✓</span>
      <div class="min-w-0">
        <div class="text-sm text-gray-500 line-through font-medium">${p.property_name}</div>
        <div class="text-xs text-gray-400 mt-0.5">
          ${typeLabel ? `<span class="font-semibold">${typeLabel}</span>` : ""}
          ${p.completed_by_name ? (typeLabel ? " · " : "") + p.completed_by_name : ""}
          ${date ? " · " + date : ""}
        </div>
        ${p.comment ? `<div class="text-xs text-gray-500 italic mt-0.5">"${p.comment}"</div>` : ""}
      </div>
    </div>`;
}

function selectType(propId, code) {
  selectedType[propId] = code;
  document.querySelectorAll(`[data-prop="${propId}"]`).forEach(btn => {
    const selected = btn.dataset.code === code;
    btn.classList.toggle("bg-indigo-600",  selected);
    btn.classList.toggle("text-white",     selected);
    btn.classList.toggle("border-indigo-600", selected);
    btn.classList.toggle("bg-white",       !selected);
    btn.classList.toggle("text-gray-600",  !selected);
    btn.classList.toggle("border-gray-200",!selected);
  });
}

function showForm(id) {
  document.getElementById(`form-${id}`).classList.remove("hidden");
  document.getElementById(`doneBtn-${id}`).classList.add("hidden");
  // pre-select first type if none chosen yet
  if (!selectedType[id]) selectType(id, TASK_TYPES[0].code);
}

function cancelForm(id) {
  document.getElementById(`form-${id}`).classList.add("hidden");
  document.getElementById(`doneBtn-${id}`).classList.remove("hidden");
  document.getElementById(`comment-${id}`).value = "";
}

async function submitComplete(propId) {
  const comment   = (document.getElementById("comment-" + propId)?.value || "").trim();
  const task_type = selectedType[propId] || "departure_clean";
  const res = await fetch(`/projects/${PROJECT_ID}/properties/${propId}/complete`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({comment, task_type}),
  });
  const data = await res.json();
  if (data.success) {
    const p = allProps.find(x => x.id === propId);
    if (p) {
      p.completion_id     = 1;
      p.completed_by_name = data.completed_by;
      p.completed_at      = data.completed_at;
      p.comment           = comment;
      p.task_type         = data.task_type;
    }
    delete selectedType[propId];
    updateProgress();
    render();
  }
}

function updateProgress() {
  const total = allProps.length;
  const done  = allProps.filter(p => p.completion_id).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progressBar").style.width  = pct + "%";
  document.getElementById("progressChip").textContent = `${done}/${total}`;
}

render();
</script>
</body>
</html>
