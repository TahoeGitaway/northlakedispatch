<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password — North Lake Dispatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
        <div class="text-4xl mb-2">🏔</div>
        <h1 class="text-xl font-bold text-gray-800">Reset your password</h1>
        <p class="text-sm text-gray-500 mt-1">Enter your email and we'll send a reset link</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="mb-4 px-3 py-2 rounded text-sm
            {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
            <input type="email" name="email" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium
                       py-2 rounded-lg transition-colors">
            Send Reset Link
        </button>
    </form>
    <p class="text-center text-sm mt-4">
        <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:underline">Back to login</a>
    </p>
</div>
</body>
</html>
