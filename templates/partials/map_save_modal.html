<!-- SAVE MODAL -->
<div id="saveModal"
     class="hidden fixed inset-0 bg-black/50 z-[10000] flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto">
    <h3 id="saveModalTitle" class="font-bold text-lg text-gray-800 mb-4">Save Route</h3>
    <div id="saveError"   class="hidden mb-3 px-3 py-2 bg-red-100 text-red-700 rounded text-sm"></div>
    <div id="saveSuccess" class="hidden mb-3 px-3 py-2 bg-green-100 text-green-700 rounded text-sm"></div>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Route Name</label>
        <input id="saveRouteName" type="text" placeholder="e.g. Friday Cleans – North Shore"
               class="w-full border rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Assigned To</label>
        <input id="saveAssignedTo" type="text" placeholder="e.g. Sarah"
               class="w-full border rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Route Date</label>
        <input id="saveRouteDate" type="date"
               class="w-full border rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      {% if teams %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Team</label>
        <select id="saveTeamId"
                class="w-full border rounded-lg px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-indigo-400">
          {% for t in teams %}
          <option value="{{ t.id }}" {% if t.id == user_team_id %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}
    </div>
    <!-- Sync report (after Save & Sync) -->
    <div id="saveSyncResult"
         class="hidden mt-4 text-xs rounded-lg bg-gray-50 border border-gray-200 px-3 py-2
                space-y-0.5 max-h-60 overflow-y-auto"></div>

    <div id="saveActions" class="flex flex-col gap-2 mt-5">
      {% if current_user.is_admin %}
      <button id="saveSyncBtn" onclick="submitSaveRoute('sync')"
              class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold
                     py-2.5 rounded-lg text-sm transition-colors">
        💾 Save &amp; Sync Times to Breezeway
      </button>
      {% endif %}
      <button id="saveReturnBtn" onclick="submitSaveRoute('return')"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                     py-2.5 rounded-lg text-sm transition-colors">
        💾 Save &amp; Return to Routes
      </button>
      <button onclick="closeSaveModal()"
              class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium
                     py-2 rounded-lg text-sm transition-colors">Cancel</button>
    </div>

    <!-- Shown after a Save & Sync completes -->
    <div id="postSyncActions" class="hidden mt-4">
      <button onclick="_goToSavedRoutes()"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                     py-2.5 rounded-lg text-sm transition-colors">
        Return to Routes &rarr;
      </button>
    </div>
  </div>
</div>
