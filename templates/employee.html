<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4f46e5">
  <title>Employee Routing — North Lake Dispatch</title>
  <link rel="icon" type="image/jpeg" href="/static/favicon.jpg">
  <link rel="stylesheet" href="/static/tailwind.min.css">
  <style>
    /* Prevent iOS input zoom */
    input, select, textarea { font-size: 16px !important; }

    /* Autocomplete dropdown */
    #propDropdown, #startDropdown {
      position: absolute;
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-radius: 0 0 10px 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }
    .drop-item {
      padding: 12px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .drop-item:last-child { border-bottom: none; }
    .drop-item:active, .drop-item.active { background: #eef2ff; }

    /* Stop pill */
    .stop-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stop-pill .stop-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stop-pill .stop-name { flex: 1; font-size: 0.875rem; font-weight: 500; color: #111827; }
    .stop-pill .drive-tag { font-size: 0.75rem; color: #6b7280; white-space: nowrap; }

    /* Result stop pill */
    .result-pill {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .result-pill .rnum {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .result-pill .rinfo { flex: 1; }
    .result-pill .rname { font-size: 0.9rem; font-weight: 600; color: #111827; }
    .result-pill .rdrive { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

<!-- ── HEADER ── -->
<div class="bg-white border-b border-gray-100 px-4 py-3 sticky top-0 z-20 shadow-sm">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <img src="/static/favicon.jpg" class="w-7 h-7 object-contain">
      <div>
        <div class="font-bold text-gray-900 text-sm leading-tight">North Lake Dispatch</div>
        <div class="text-xs text-indigo-600 font-medium">Employee Routing Tool</div>
      </div>
    </div>
    <a href="/logout" class="text-xs text-gray-400 hover:text-gray-600 font-medium px-3 py-1.5 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors">
      Log out
    </a>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="px-4 pt-5 space-y-5 max-w-lg mx-auto">

  <!-- START LOCATION -->
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
      Start Location
    </label>
    <div class="relative">
      <input id="startInput" type="text" autocomplete="off"
             placeholder="Tahoe Getaways Office"
             value="{{ default_start.name }}"
             class="w-full border border-gray-300 rounded-xl px-4 py-3.5 pr-10
                    focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white shadow-sm">
      <button id="clearStartBtn" onclick="clearStart()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300
                     hover:text-gray-500 text-xl leading-none hidden">✕</button>
      <div id="startDropdown" class="hidden"></div>
    </div>
    <p id="startCoordHint" class="text-xs text-gray-400 mt-1 pl-1">
      Default: Tahoe Getaways Office
    </p>
  </div>

  <!-- ADD STOP -->
  <div>
    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
      Add Stops
    </label>
    <div class="relative">
      <input id="propInput" type="text" autocomplete="off"
             placeholder="Search property name…"
             class="w-full border border-gray-300 rounded-xl px-4 py-3.5
                    focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white shadow-sm">
      <div id="propDropdown" class="hidden"></div>
    </div>
  </div>

  <!-- STOP LIST -->
  <div id="stopList" class="space-y-2"></div>

  <!-- EMPTY STATE -->
  <div id="emptyHint" class="text-center py-6 text-gray-400 text-sm">
    Search for properties above to add stops.
  </div>

  <!-- ACTION BUTTONS -->
  <div id="actionBtns" class="hidden space-y-3">
    <button onclick="buildRoute('keep')"
            class="w-full bg-white border-2 border-indigo-500 text-indigo-600
                   font-bold py-4 rounded-xl text-base shadow-sm
                   active:bg-indigo-50 transition-colors">
      Keep My Order
    </button>
    <button onclick="buildRoute('optimize')"
            class="w-full bg-indigo-600 text-white
                   font-bold py-4 rounded-xl text-base shadow-sm
                   active:bg-indigo-700 transition-colors">
      Optimize Order
    </button>
  </div>

  <!-- SPINNER -->
  <div id="spinner" class="hidden flex justify-center py-6">
    <svg class="animate-spin h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
    </svg>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection" class="hidden space-y-4">
    <div class="flex items-center justify-between">
      <h2 class="font-bold text-gray-800 text-base">Your Route</h2>
      <button onclick="clearResults()"
              class="text-xs text-gray-400 hover:text-gray-600 underline">
        Clear
      </button>
    </div>

    <div class="bg-indigo-50 border border-indigo-200 rounded-xl px-4 py-3 text-sm text-indigo-700 font-medium" id="routeSummary"></div>

    <div id="resultList" class="space-y-2"></div>

    <a id="mapsBtn" href="#" target="_blank"
       class="flex items-center justify-center gap-2 w-full
              bg-green-600 hover:bg-green-700 active:bg-green-800
              text-white font-bold py-4 rounded-xl text-base shadow-md
              transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
      </svg>
      Open in Google Maps
    </a>
  </div>

</div><!-- /main -->

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const ALL_PROPS = {{ properties|tojson }};
const DEFAULT_START = {{ default_start|tojson }};

let startLocation = { ...DEFAULT_START };
let stops = [];          // [{name, lat, lng}, ...]

// ── Start location autocomplete ───────────────────────────────────────────────
const startInput    = document.getElementById("startInput");
const startDropdown = document.getElementById("startDropdown");
const clearStartBtn = document.getElementById("clearStartBtn");
const startHint     = document.getElementById("startCoordHint");

startInput.addEventListener("input", () => {
  const q = startInput.value.trim().toLowerCase();
  clearStartBtn.classList.toggle("hidden", q === "");
  if (q.length < 1) { startDropdown.classList.add("hidden"); return; }
  const matches = ALL_PROPS.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { startDropdown.classList.add("hidden"); return; }
  startDropdown.innerHTML = matches.map(p =>
    `<div class="drop-item" onclick="pickStart(${JSON.stringify(p.name)}, ${p.lat}, ${p.lng})">${p.name}</div>`
  ).join("");
  startDropdown.classList.remove("hidden");
});

function pickStart(name, lat, lng) {
  startLocation = { name, lat, lng };
  startInput.value = name;
  startDropdown.classList.add("hidden");
  clearStartBtn.classList.remove("hidden");
  startHint.textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

function clearStart() {
  startLocation = { ...DEFAULT_START };
  startInput.value = "";
  startDropdown.classList.add("hidden");
  clearStartBtn.classList.add("hidden");
  startHint.textContent = "Default: Tahoe Getaways Office";
}

document.addEventListener("click", e => {
  if (!startInput.contains(e.target) && !startDropdown.contains(e.target)) {
    startDropdown.classList.add("hidden");
    // If the field was left blank, reset to default
    if (startInput.value.trim() === "") clearStart();
  }
});

// ── Property autocomplete ─────────────────────────────────────────────────────
const propInput    = document.getElementById("propInput");
const propDropdown = document.getElementById("propDropdown");

propInput.addEventListener("input", () => {
  const q = propInput.value.trim().toLowerCase();
  if (q.length < 1) { propDropdown.classList.add("hidden"); return; }
  const alreadyAdded = new Set(stops.map(s => s.name));
  const matches = ALL_PROPS.filter(p =>
    p.name.toLowerCase().includes(q) && !alreadyAdded.has(p.name)
  ).slice(0, 10);
  if (!matches.length) { propDropdown.classList.add("hidden"); return; }
  propDropdown.innerHTML = matches.map(p =>
    `<div class="drop-item" onclick="addStop(${JSON.stringify(p.name)}, ${p.lat}, ${p.lng})">${p.name}</div>`
  ).join("");
  propDropdown.classList.remove("hidden");
});

document.addEventListener("click", e => {
  if (!propInput.contains(e.target) && !propDropdown.contains(e.target)) {
    propDropdown.classList.add("hidden");
  }
});

function addStop(name, lat, lng) {
  stops.push({ name, lat, lng });
  propInput.value = "";
  propDropdown.classList.add("hidden");
  renderStopList();
  clearResults();
}

// ── Stop list rendering ───────────────────────────────────────────────────────
function renderStopList() {
  const list = document.getElementById("stopList");
  const empty = document.getElementById("emptyHint");
  const btns  = document.getElementById("actionBtns");

  if (stops.length === 0) {
    list.innerHTML = "";
    empty.classList.remove("hidden");
    btns.classList.add("hidden");
    return;
  }
  empty.classList.add("hidden");
  btns.classList.remove("hidden");

  list.innerHTML = stops.map((s, i) => `
    <div class="stop-pill" id="pill-${i}">
      <div class="stop-num">${i + 1}</div>
      <div class="stop-name">${escHtml(s.name)}</div>
      <div class="flex items-center gap-1">
        <button onclick="moveStop(${i}, -1)" ${i === 0 ? "disabled" : ""}
                class="w-8 h-8 rounded-lg flex items-center justify-center
                       text-gray-400 hover:bg-gray-100 disabled:opacity-30
                       text-lg font-bold transition-colors">↑</button>
        <button onclick="moveStop(${i}, 1)" ${i === stops.length - 1 ? "disabled" : ""}
                class="w-8 h-8 rounded-lg flex items-center justify-center
                       text-gray-400 hover:bg-gray-100 disabled:opacity-30
                       text-lg font-bold transition-colors">↓</button>
        <button onclick="removeStop(${i})"
                class="w-8 h-8 rounded-lg flex items-center justify-center
                       text-red-400 hover:bg-red-50 text-base transition-colors">✕</button>
      </div>
    </div>
  `).join("");
}

function moveStop(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= stops.length) return;
  [stops[i], stops[j]] = [stops[j], stops[i]];
  renderStopList();
  clearResults();
}

function removeStop(i) {
  stops.splice(i, 1);
  renderStopList();
  clearResults();
}

// ── Build route ───────────────────────────────────────────────────────────────
async function buildRoute(mode) {
  if (stops.length === 0) return;

  document.getElementById("spinner").classList.remove("hidden");
  document.getElementById("actionBtns").classList.add("hidden");
  document.getElementById("resultsSection").classList.add("hidden");

  try {
    const resp = await fetch("/employee/route", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mode,
        stops: stops.map(s => s.name),
        start: startLocation,
      }),
    });
    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || "Server error");

    // Update stops order to match server response
    stops = data.ordered_stops;
    renderResults(data);
    renderStopList();
  } catch (err) {
    alert("Error: " + err.message);
  } finally {
    document.getElementById("spinner").classList.add("hidden");
    document.getElementById("actionBtns").classList.remove("hidden");
  }
}

function renderResults(data) {
  const { ordered_stops, drive_times, total_minutes, start } = data;

  // Summary bar
  const hrs = Math.floor(total_minutes / 60);
  const min = total_minutes % 60;
  document.getElementById("routeSummary").textContent =
    `${ordered_stops.length} stop${ordered_stops.length !== 1 ? "s" : ""} · ` +
    (hrs > 0 ? `${hrs} hr ${min} min` : `${min} min`) + " estimated drive time";

  // Result pills
  document.getElementById("resultList").innerHTML = ordered_stops.map((s, i) => `
    <div class="result-pill">
      <div class="rnum">${i + 1}</div>
      <div class="rinfo">
        <div class="rname">${escHtml(s.name)}</div>
        ${i === 0
          ? `<div class="rdrive">~${drive_times[i]} min from start</div>`
          : `<div class="rdrive">~${drive_times[i]} min from previous stop</div>`
        }
      </div>
    </div>
  `).join("");

  // Google Maps URL
  const coords = [
    `${start.lat},${start.lng}`,
    ...ordered_stops.map(s => `${s.lat},${s.lng}`),
  ];
  document.getElementById("mapsBtn").href =
    "https://www.google.com/maps/dir/" + coords.join("/");

  document.getElementById("resultsSection").classList.remove("hidden");
  document.getElementById("resultsSection").scrollIntoView({ behavior: "smooth", block: "start" });
}

function clearResults() {
  document.getElementById("resultsSection").classList.add("hidden");
}

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>

</body>
</html>
