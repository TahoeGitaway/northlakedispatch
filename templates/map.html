<!DOCTYPE html>
<html>
<head>
    <title>Tahoe Routing</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin:0;
            display:flex;
        }

        #sidebar {
            width:340px;
            padding:15px;
            background:#f7f7f7;
            border-right:1px solid #ddd;
            height:100vh;
            overflow:auto;
        }

        #map {
            flex:1;
            height:100vh;
        }

        input {
            width:100%;
            padding:8px;
            margin-bottom:8px;
        }

        button {
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#e91e63;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .suggestion {
            padding:6px;
            cursor:pointer;
            border-bottom:1px solid #ddd;
        }

        .suggestion:hover {
            background:#eee;
        }

        .stopRow {
            margin-bottom:6px;
            padding:6px;
            background:white;
            border-radius:6px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Tahoe Routing</h3>

    <input id="searchBox" placeholder="Type property name...">
    <div id="suggestions"></div>

    <h4>Selected Stops</h4>
    <div id="selectedStops"></div>

    <button onclick="optimizeRoute()">Optimize Route</button>

    <h3>Route Order</h3>
    <ol id="routeList"></ol>

    <p><b>Drive Time:</b> <span id="driveTime">—</span></p>
    <p><b>Distance:</b> <span id="distance">—</span></p>
</div>

<div id="map"></div>

<script>
    // Map
    var map = L.map('map').setView([39.3279, -120.1833], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:18
    }).addTo(map);

    const properties = {{ properties|tojson }};

    let selectedStops = [];
    let routeLayer = null;

    // Default start location (TG Office)
    let startLocation = {
        name: "Tahoe Getaways Office",
        lat: 39.3279,
        lng: -120.1833
    };

    // Markers
    properties.forEach(p => {
        if(p.lat && p.lng){
            L.marker([p.lat, p.lng])
                .addTo(map)
                .bindPopup(`<b>${p.name}</b><br>${p.address}`);
        }
    });

    // Predictive Search
    const searchBox = document.getElementById("searchBox");
    const suggestions = document.getElementById("suggestions");

    searchBox.addEventListener("input", function(){
        let text = this.value.toLowerCase();
        suggestions.innerHTML = "";

        if(text.length < 2) return;

        let matches = properties
            .filter(p => p.name.toLowerCase().includes(text))
            .slice(0,10);

        matches.forEach(p => {
            let div = document.createElement("div");
            div.className = "suggestion";
            div.innerText = p.name;
            div.onclick = () => addStop(p);
            suggestions.appendChild(div);
        });
    });

    function addStop(property){

        if(selectedStops.find(s => s.name === property.name)) return;

        selectedStops.push({
            name: property.name,
            lat: property.lat,
            lng: property.lng,
            arrival:false
        });

        renderStops();
        suggestions.innerHTML="";
        searchBox.value="";
    }

    function renderStops(){
        const container = document.getElementById("selectedStops");
        container.innerHTML="";

        selectedStops.forEach((s,i)=>{
            let div = document.createElement("div");
            div.className="stopRow";

            div.innerHTML = `
                <b>${s.name}</b><br>
                Arrival <input type="checkbox" onchange="toggleArrival(${i})">
                <button onclick="removeStop(${i})">Remove</button>
            `;

            container.appendChild(div);
        });
    }

    function toggleArrival(index){
        selectedStops[index].arrival =
            !selectedStops[index].arrival;
    }

    function removeStop(index){
        selectedStops.splice(index,1);
        renderStops();
    }

    function optimizeRoute(){

        fetch("/optimize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                stops: selectedStops,
                start: startLocation
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                alert(data.error);
                return;
            }

            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            routeLayer = L.geoJSON(data.geometry, {
                style: {
                    color: "#ff2da0",
                    weight: 5
                }
            }).addTo(map);

            document.getElementById("driveTime").innerText =
                (data.duration / 60).toFixed(1) + " minutes";

            document.getElementById("distance").innerText =
                (data.distance / 1609).toFixed(1) + " miles";

            const list = document.getElementById("routeList");
            list.innerHTML = "";

            data.ordered_stops.forEach((stop, index) => {
                const li = document.createElement("li");
                li.textContent = (index + 1) + ". " + stop.name;
                list.appendChild(li);
            });

        })
        .catch(err => {
            console.error("Routing error:", err);
            alert("Routing failed.");
        });
    }

</script>

</body>
</html>
