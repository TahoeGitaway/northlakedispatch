{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='map.css') }}">

{% include "partials/map_overlays.html" %}
{% include "partials/map_sidebar.html" %}
{% include "partials/map_save_modal.html" %}

<script>
/* STATE — server data + client state. All functions in /static/map-*.js */
const properties = {{ properties|tojson }};

let selectedStops     = [];
let optimizedSchedule = [];
let isOptimized       = false;
let currentRouteId    = null;
let viewMode          = 'full';
let durationMatrix    = [];
let startMinutes      = 9 * 60;
let lastStats         = { total_duration:0, driving_duration:0, service_duration:0, distance:0 };
let routeLayer        = null;
let activeRouteMarkers = [];
let markers           = {};
let currentSuggestions = [];
let activeIndex       = -1;
let _stopIdCounter    = 0;

let startLocation = { name:"Tahoe Getaways Office", lat:39.34207, lng:-120.21422 };
const DEFAULT_START_LOCATION = { name:"Tahoe Getaways Office", lat:39.34207, lng:-120.21422 };
const DEADLINE_MINS = 16 * 60;
const PRIORITY_MINS = 12 * 60;

document.getElementById("startTime").addEventListener("change", function() {
  startMinutes = hhmmToMinutes(this.value);
  if (isOptimized) { recalculateTimes(); renderSchedule(); }
});
</script>

<script src="{{ url_for('static', filename='map-helpers.js') }}"></script>
<script src="{{ url_for('static', filename='map-map.js') }}"></script>
<script src="{{ url_for('static', filename='map-schedule.js') }}"></script>
<script src="{{ url_for('static', filename='map-search.js') }}"></script>
<script src="{{ url_for('static', filename='map-optimize.js') }}"></script>

{% endblock %}
