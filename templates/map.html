{% extends "base.html" %}
{% block content %}

<style>
  /* ── BANANA LOADER ── */
  #loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #loadingOverlay.active { display: flex; }

  #loadingOverlay .banana {
    font-size: 3.5rem;
    animation: bananaSpin 0.55s linear infinite;
    transform-origin: center;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  @keyframes bananaSpin {
    0%   { transform: rotate(-20deg) scale(1); }
    25%  { transform: rotate(10deg)  scale(1.15); }
    50%  { transform: rotate(-20deg) scale(1); }
    75%  { transform: rotate(10deg)  scale(0.9); }
    100% { transform: rotate(-20deg) scale(1); }
  }
  #loadingOverlay p {
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  /* ── BADGES ── */
  .checkin-badge {
    display: inline-block;
    background: #16a34a;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .late-badge {
    display: inline-block;
    background: #dc2626;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── WARNINGS ── */
  .shift-warning    { background:#fef9c3; border:1px solid #ca8a04; color:#92400e; }
  .deadline-warning { background:#fee2e2; border:1px solid #dc2626; color:#991b1b; }

  /* ── ROUTE NUMBER TOOLTIP ── */
  .route-number {
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* ── STOP CARD DRAG HINT ── */
  .stop-card { transition: box-shadow 0.15s; }
  .stop-card:hover { box-shadow: 0 2px 8px rgba(99,102,241,0.18); }

  /* ── MOVE BUTTONS ── */
  .move-btn {
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.75rem;
    background: #e0e7ff;
    color: #3730a3;
    border: 1px solid #c7d2fe;
    cursor: pointer;
    transition: background 0.1s;
  }
  .move-btn:hover { background: #c7d2fe; }
  .move-btn:disabled { opacity: 0.35; cursor: default; }
</style>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="banana">🍌</div>
  <p>Optimizing your route…</p>
</div>

<div class="flex h-[calc(100vh-72px)]">

  <!-- ═══════════════ SIDEBAR ═══════════════ -->
  <div class="w-96 bg-white shadow-xl p-6 overflow-y-auto flex flex-col gap-4">

    <h2 class="text-xl font-bold">Tahoe Dispatch</h2>

    <!-- START LOCATION (office-only for now) -->
    <div class="p-3 bg-gray-100 rounded-lg text-sm text-gray-600">
      <span class="font-medium text-gray-800">Start &amp; End:</span>
      Tahoe Getaways Office
    </div>

    <!-- START TIME -->
    <div>
      <label class="text-sm text-gray-600">Start Time</label>
      <input type="time" id="startTime" value="09:00"
             class="w-full border rounded-lg p-2 mt-1">
      <div class="text-xs text-gray-400 mt-1">Check-ins must finish by 4:00 PM</div>
    </div>

    <!-- SEARCH -->
    <div class="relative">
      <input id="searchBox" placeholder="Add property…"
             class="w-full border rounded-lg p-2"
             autocomplete="off">
      <div id="suggestions"
           class="absolute z-10 left-0 right-0 bg-white border rounded-lg mt-1
                  max-h-48 overflow-y-auto shadow-lg hidden">
      </div>
    </div>

    <!-- STOPS LIST -->
    <div>
      <h4 class="font-semibold text-sm mb-2">
        Selected Stops
        <span id="stopCount" class="text-gray-400 font-normal"></span>
      </h4>
      <div id="selectedStops" class="space-y-2"></div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="flex flex-col gap-2 pt-2">
      <button id="optimizeBtn" onclick="optimizeRoute()"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2
                     rounded-lg w-full font-medium transition-colors">
        Optimize Route
      </button>

      <div class="flex gap-2">
        <button onclick="reverseStops()"
                class="flex-1 bg-gray-500 hover:bg-gray-600 text-white px-3 py-2
                       rounded-lg text-sm font-medium transition-colors">
          ↕ Reverse
        </button>
        <button onclick="exportToGoogleMaps()"
                class="flex-1 bg-green-600 hover:bg-green-700 text-white px-3 py-2
                       rounded-lg text-sm font-medium transition-colors">
          📍 Google Maps
        </button>
      </div>
    </div>

    <!-- WARNINGS -->
    <div id="warningBox" class="text-sm hidden p-2 rounded"></div>

    <!-- ROUTE SCHEDULE (shown after optimization) -->
    <div id="scheduleSection" class="hidden">
      <h3 class="font-semibold mb-2">Route Schedule</h3>
      <ol id="routeList" class="space-y-2"></ol>

      <div class="mt-4 text-sm space-y-1 bg-gray-50 rounded-lg p-3">
        <div><b>Total:</b>   <span id="totalTime">—</span></div>
        <div><b>Driving:</b> <span id="drivingTime">—</span></div>
        <div><b>At Houses:</b> <span id="serviceTime">—</span></div>
        <div><b>Distance:</b> <span id="distance">—</span></div>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- MAP -->
  <div id="map" class="flex-1"></div>

</div><!-- /flex -->

<script>
/* ================================================================
   STATE
================================================================ */
const properties = {{ properties|tojson }};

let selectedStops     = [];   // pre-optimization stop objects
let optimizedSchedule = [];   // post-optimization schedule (drives exports)
let isOptimized       = false;

let routeLayer        = null;
let activeRouteMarkers = [];
let markers           = {};

let currentSuggestions = [];
let activeIndex        = -1;

const startLocation = {
  name: "Tahoe Getaways Office",
  lat:  39.34207,
  lng: -120.21422
};

/* ================================================================
   MAP INIT
================================================================ */
const map = L.map('map').setView([39.3279, -120.1833], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            { maxZoom: 18 }).addTo(map);

const regularIcon = new L.Icon({
  iconUrl:   "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41], iconAnchor: [12,41]
});
const checkinIcon = new L.Icon({
  iconUrl:   "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41], iconAnchor: [12,41]
});
const nearDeadlineIcon = new L.Icon({
  iconUrl:   "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41], iconAnchor: [12,41]
});

/* ================================================================
   UNIQUE ID HELPER  (fix for index-based handler bug)
================================================================ */
let _stopIdCounter = 0;
function makeStopId() { return "stop_" + (++_stopIdCounter); }

/* ================================================================
   SEARCH
================================================================ */
const searchBox  = document.getElementById("searchBox");
const suggestions = document.getElementById("suggestions");

searchBox.addEventListener("input", function () {
  const text = this.value.toLowerCase().trim();
  currentSuggestions = [];
  activeIndex = -1;

  if (text.length < 2) { closeSuggestions(); return; }

  const alreadySelected = new Set(selectedStops.map(s => s.name));
  currentSuggestions = properties
    .filter(p => p.name && p.name.toLowerCase().includes(text)
                        && !alreadySelected.has(p.name))
    .slice(0, 10);

  renderSuggestions();
});

searchBox.addEventListener("keydown", function (e) {
  if (!currentSuggestions.length) return;

  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeIndex = (activeIndex + 1) % currentSuggestions.length;
    updateHighlight();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeIndex = (activeIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
    updateHighlight();
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (activeIndex >= 0) { addStop(currentSuggestions[activeIndex]); closeSuggestions(); }
  } else if (e.key === "Escape") {
    closeSuggestions();
  }
});

document.addEventListener("click", function (e) {
  if (!suggestions.contains(e.target) && e.target !== searchBox) closeSuggestions();
});

function renderSuggestions() {
  suggestions.innerHTML = "";
  if (!currentSuggestions.length) { suggestions.classList.add("hidden"); return; }
  suggestions.classList.remove("hidden");

  currentSuggestions.forEach((p, idx) => {
    const div = document.createElement("div");
    div.className = "p-2 cursor-pointer border-b text-sm hover:bg-indigo-50";
    div.textContent = p.name;
    div.addEventListener("mouseenter", () => { activeIndex = idx; updateHighlight(); });
    div.addEventListener("click", () => { addStop(p); closeSuggestions(); });
    suggestions.appendChild(div);
  });
}

function updateHighlight() {
  [...suggestions.children].forEach((el, i) =>
    el.classList.toggle("bg-indigo-100", i === activeIndex));
}

function closeSuggestions() {
  suggestions.classList.add("hidden");
  suggestions.innerHTML = "";
  searchBox.value = "";
  currentSuggestions = [];
  activeIndex = -1;
}

/* ================================================================
   STOPS  (stable ID-based, no index baked into handlers)
================================================================ */
function addStop(property) {
  if (selectedStops.find(s => s.name === property.name)) return;

  selectedStops.push({
    _id:            makeStopId(),   // stable identity
    name:           property.name,
    lat:            property.lat,
    lng:            property.lng,
    arrival:        false,
    serviceMinutes: 60
  });

  isOptimized = false;
  renderStops();
}

function removeStop(id) {
  selectedStops = selectedStops.filter(s => s._id !== id);
  if (isOptimized) {
    optimizedSchedule = optimizedSchedule.filter(s => s._id !== id);
  }
  isOptimized = false;
  renderStops();
}

function setArrival(id, val) {
  const s = selectedStops.find(s => s._id === id);
  if (s) s.arrival = val;
  // also keep optimizedSchedule in sync
  const os = optimizedSchedule.find(s => s._id === id);
  if (os) os.arrival = val;
}

function setServiceMinutes(id, val) {
  const s = selectedStops.find(s => s._id === id);
  if (s) s.serviceMinutes = val;
  const os = optimizedSchedule.find(s => s._id === id);
  if (os) os.serviceMinutes = val;
}

/* Renders the pre-optimization add/edit list */
function renderStops() {
  const container = document.getElementById("selectedStops");
  const countEl   = document.getElementById("stopCount");
  container.innerHTML = "";
  countEl.textContent = selectedStops.length ? `(${selectedStops.length})` : "";

  if (!selectedStops.length) {
    container.innerHTML = '<p class="text-sm text-gray-400">No stops added yet.</p>';
    return;
  }

  selectedStops.forEach(s => {
    const div = document.createElement("div");
    div.className = "stop-card bg-gray-50 p-2 rounded shadow-sm text-sm";
    div.dataset.id = s._id;

    div.innerHTML = `
      <div class="font-medium text-gray-800 truncate mb-1">${s.name}</div>
      <div class="flex items-center gap-3 flex-wrap">
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" class="accent-green-600"
                 onchange="setArrival('${s._id}', this.checked)"
                 ${s.arrival ? "checked" : ""}>
          <span class="text-gray-600">Check-in</span>
        </label>
        <select class="border rounded px-1 py-0.5 text-xs"
                onchange="setServiceMinutes('${s._id}', parseInt(this.value))">
          ${generateTimeOptions(s.serviceMinutes)}
        </select>
      </div>
      <button onclick="removeStop('${s._id}')"
              class="text-red-400 hover:text-red-600 text-xs mt-1">✕ Remove</button>
    `;
    container.appendChild(div);
  });
}

function generateTimeOptions(selected) {
  let html = "";
  for (let m = 15; m <= 240; m += 15) {
    html += `<option value="${m}" ${m === selected ? "selected" : ""}>${m} min</option>`;
  }
  return html;
}

/* ================================================================
   REVERSE STOPS
   Works on whichever list is "active":
   - pre-optimization  → reverses selectedStops, re-renders stop cards
   - post-optimization → reverses optimizedSchedule, re-renders schedule
================================================================ */
function reverseStops() {
  if (isOptimized) {
    optimizedSchedule.reverse();
    renderSchedule();
    redrawRouteOnMap();
  } else {
    selectedStops.reverse();
    renderStops();
  }
}

/* ================================================================
   MANUAL MOVE (post-optimization only)
================================================================ */
function moveRouteUp(btn) {
  const li  = btn.closest("li");
  const idx = [...document.getElementById("routeList").children].indexOf(li);
  if (idx <= 0) return;
  [optimizedSchedule[idx - 1], optimizedSchedule[idx]] =
    [optimizedSchedule[idx], optimizedSchedule[idx - 1]];
  renderSchedule();
  redrawRouteOnMap();
}

function moveRouteDown(btn) {
  const li   = btn.closest("li");
  const list = document.getElementById("routeList");
  const idx  = [...list.children].indexOf(li);
  if (idx >= optimizedSchedule.length - 1) return;
  [optimizedSchedule[idx], optimizedSchedule[idx + 1]] =
    [optimizedSchedule[idx + 1], optimizedSchedule[idx]];
  renderSchedule();
  redrawRouteOnMap();
}

/* ================================================================
   ROUTE MARKERS
================================================================ */
function clearRouteMarkers() {
  activeRouteMarkers.forEach(m => map.removeLayer(m));
  activeRouteMarkers = [];
  markers = {};
}

/* Redraws the OSRM polyline + numbered markers from optimizedSchedule */
async function redrawRouteOnMap() {
  clearRouteMarkers();
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }

  // Start marker
  const startMarker = L.marker([startLocation.lat, startLocation.lng], { icon: regularIcon })
    .addTo(map)
    .bindPopup(`<b>Start / End</b><br>${startLocation.name}`);
  activeRouteMarkers.push(startMarker);

  // Re-fetch OSRM geometry for current order
  const locs = [startLocation, ...optimizedSchedule];
  const coordStr = locs.map(s => `${s.lng},${s.lat}`).join(";");
  const routeUrl = `http://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`;

  try {
    const resp  = await fetch(routeUrl);
    const rdata = await resp.json();
    const geo   = rdata.routes?.[0]?.geometry;
    if (geo) {
      routeLayer = L.geoJSON(geo, { style: { color: "#6366f1", weight: 5 } }).addTo(map);
    }
  } catch (_) { /* map still usable without polyline */ }

  // Stop markers
  optimizedSchedule.forEach((stop, index) => {
    let icon = regularIcon;
    if (stop.arrival && stop.late)    icon = nearDeadlineIcon;
    else if (stop.arrival)            icon = checkinIcon;

    const depMin = stop.eta_minutes + stop.serviceMinutes;
    const departure = `${String(Math.floor(depMin/60)%24).padStart(2,'0')}:${String(depMin%60).padStart(2,'0')}`;

    const marker = L.marker([stop.lat, stop.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${stop.name}</b><br>
        Arrive: ${stop.eta}<br>
        Depart: ${departure}<br>
        ${stop.arrival
          ? (stop.late
              ? "<span style='color:#dc2626;font-weight:700;'>LATE CHECK-IN</span>"
              : "<span style='color:#16a34a;font-weight:700;'>CHECK-IN</span>")
          : ""}`);

    marker.bindTooltip(`${index + 1}`, {
      permanent: true, direction: "top", className: "route-number"
    });

    activeRouteMarkers.push(marker);
    markers[stop.name] = marker;
  });
}

/* ================================================================
   RENDER SCHEDULE  (the post-optimization stop list)
================================================================ */
function renderSchedule() {
  const list = document.getElementById("routeList");
  list.innerHTML = "";

  optimizedSchedule.forEach((stop, index) => {
    const depMin  = stop.eta_minutes + stop.serviceMinutes;
    const depHH   = String(Math.floor(depMin / 60) % 24).padStart(2, '0');
    const depMM   = String(depMin % 60).padStart(2, '0');
    const departure = `${depHH}:${depMM}`;

    let badge = "";
    if (stop.arrival && stop.late)  badge = `<span class="late-badge">LATE</span>`;
    else if (stop.arrival)          badge = `<span class="checkin-badge">CHECK-IN</span>`;

    const li = document.createElement("li");
    li.className = "p-2 border rounded bg-white hover:bg-indigo-50 transition-colors cursor-pointer";

    li.innerHTML = `
      <div class="flex items-center justify-between">
        <div class="font-medium text-sm flex items-center gap-1">
          <span class="text-indigo-600 font-bold">${index + 1}.</span>
          <span class="truncate max-w-[160px]">${stop.name}</span>
          ${badge}
        </div>
        <div class="flex gap-1 ml-2 shrink-0">
          <button class="move-btn" onclick="moveRouteUp(this)"
                  ${index === 0 ? "disabled" : ""}>▲</button>
          <button class="move-btn" onclick="moveRouteDown(this)"
                  ${index === optimizedSchedule.length - 1 ? "disabled" : ""}>▼</button>
        </div>
      </div>
      <div class="text-xs text-gray-500 mt-0.5">
        Arrive: ${stop.eta} &nbsp;|&nbsp; Depart: ${departure}
      </div>
    `;

    // Hover → pan map & open popup
    li.addEventListener("mouseenter", () => {
      const m = markers[stop.name];
      if (m) { map.panTo(m.getLatLng()); m.openPopup(); }
    });
    li.addEventListener("mouseleave", () => {
      const m = markers[stop.name];
      if (m) m.closePopup();
    });

    list.appendChild(li);
  });
}

/* ================================================================
   OPTIMIZE  (calls backend, populates optimizedSchedule)
================================================================ */
function optimizeRoute() {
  if (!selectedStops.length) { alert("Add at least one stop first."); return; }

  // Show banana 🍌
  document.getElementById("loadingOverlay").classList.add("active");
  document.getElementById("optimizeBtn").disabled = true;

  // Convert selectedStops to the payload shape backend expects
  const payload = {
    stops: selectedStops.map(s => ({
      name:           s.name,
      lat:            s.lat,
      lng:            s.lng,
      arrival:        s.arrival,
      serviceMinutes: s.serviceMinutes
    })),
    start:     startLocation,
    startTime: document.getElementById("startTime").value
  };

  fetch("/optimize", {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {

    // Hide banana
    document.getElementById("loadingOverlay").classList.remove("active");
    document.getElementById("optimizeBtn").disabled = false;

    if (data.error) { alert(data.error); return; }

    // Attach stable _id to each schedule entry by matching name
    // (backend returns stops in optimized order)
    optimizedSchedule = data.schedule.map(entry => {
      const original = selectedStops.find(s => s.name === entry.name);
      return { ...entry, _id: original?._id || makeStopId() };
    });

    isOptimized = true;

    // Stats
    document.getElementById("totalTime").textContent   = (data.total_duration  / 3600).toFixed(2) + " hrs";
    document.getElementById("drivingTime").textContent = (data.driving_duration / 3600).toFixed(2) + " hrs";
    document.getElementById("serviceTime").textContent = (data.service_duration / 3600).toFixed(2) + " hrs";
    document.getElementById("distance").textContent    = (data.distance / 1609).toFixed(1) + " miles";

    // Warnings
    const warningBox = document.getElementById("warningBox");
    warningBox.className = "text-sm hidden p-2 rounded";
    warningBox.innerHTML = "";

    const warnings = [];
    if (data.total_duration > 10 * 3600)
      warnings.push("⚠ Route exceeds 10-hour shift.");
    if (data.late_checkins?.length)
      warnings.push(`⚠ Late check-ins: ${data.late_checkins.join(", ")}`);

    if (warnings.length) {
      warningBox.classList.remove("hidden");
      warningBox.classList.add(data.late_checkins?.length ? "deadline-warning" : "shift-warning");
      warningBox.innerHTML = warnings.join("<br>");
    }

    // Show schedule panel
    document.getElementById("scheduleSection").classList.remove("hidden");

    // Draw map
    clearRouteMarkers();
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }

    routeLayer = L.geoJSON(data.geometry, {
      style: { color: "#6366f1", weight: 5 }
    }).addTo(map);

    // Start marker
    const startMarker = L.marker([startLocation.lat, startLocation.lng], { icon: regularIcon })
      .addTo(map)
      .bindPopup(`<b>Start / End</b><br>${startLocation.name}`);
    activeRouteMarkers.push(startMarker);

    // Stop markers
    optimizedSchedule.forEach((stop, index) => {
      let icon = regularIcon;
      if (stop.arrival && stop.late)  icon = nearDeadlineIcon;
      else if (stop.arrival)          icon = checkinIcon;

      const depMin    = stop.eta_minutes + stop.serviceMinutes;
      const departure = `${String(Math.floor(depMin/60)%24).padStart(2,'0')}:${String(depMin%60).padStart(2,'0')}`;

      const marker = L.marker([stop.lat, stop.lng], { icon })
        .addTo(map)
        .bindPopup(`<b>${stop.name}</b><br>
          Arrive: ${stop.eta}<br>
          Depart: ${departure}<br>
          ${stop.arrival
            ? (stop.late
                ? "<span style='color:#dc2626;font-weight:700;'>LATE CHECK-IN</span>"
                : "<span style='color:#16a34a;font-weight:700;'>CHECK-IN</span>")
            : ""}`);

      marker.bindTooltip(`${index + 1}`, {
        permanent: true, direction: "top", className: "route-number"
      });

      activeRouteMarkers.push(marker);
      markers[stop.name] = marker;
    });

    // Render sidebar list
    renderSchedule();
  })
  .catch(err => {
    document.getElementById("loadingOverlay").classList.remove("active");
    document.getElementById("optimizeBtn").disabled = false;
    alert("Request failed: " + err.message);
  });
}

/* ================================================================
   GOOGLE MAPS EXPORT  (always uses current optimizedSchedule order)
================================================================ */
function exportToGoogleMaps() {
  if (!optimizedSchedule.length) { alert("Optimize route first."); return; }

  // Google Maps supports max 10 waypoints (origin + dest + 8 stops)
  if (optimizedSchedule.length > 10) {
    alert(`Google Maps supports up to 10 waypoints. You have ${optimizedSchedule.length} stops — the first 10 will be used.`);
  }

  const stops = optimizedSchedule.slice(0, 10);
  const coords = [
    `${startLocation.lat},${startLocation.lng}`,
    ...stops.map(s => `${s.lat},${s.lng}`),
    `${startLocation.lat},${startLocation.lng}` // return to office
  ];

  window.open("https://www.google.com/maps/dir/" + coords.join("/"), "_blank");
}
</script>

{% endblock %}
