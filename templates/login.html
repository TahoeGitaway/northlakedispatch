<!DOCTYPE html>
<html>
<head>
    <title>Log In — North Lake Dispatch</title>
    <link rel="icon" type="image/jpeg" href="/static/favicon.jpg">
    <link rel="stylesheet" href="/static/tailwind.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
        <img src="/static/favicon.jpg" class="w-16 h-16 object-contain mx-auto mb-2">
        <h1 class="text-2xl font-bold text-gray-800">North Lake Dispatch</h1>
        <p class="text-sm text-gray-500 mt-1">Sign in to continue</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="mb-4 px-3 py-2 rounded text-sm
            {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required autofocus
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-indigo-400"
                   placeholder="you@tahoegetaways.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <div class="relative">
                <input type="password" name="password" id="passwordInput" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 pr-10 text-sm
                              focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <button type="button" onclick="togglePassword()"
                        class="absolute inset-y-0 right-0 flex items-center px-3
                               text-gray-400 hover:text-gray-600 transition-colors">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
                         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                                 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
                <input type="checkbox" name="remember" class="accent-indigo-600">
                Remember me
            </label>
            <a href="{{ url_for('auth.forgot_password') }}"
               class="text-indigo-600 hover:text-indigo-800">Forgot password?</a>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium
                       py-2 rounded-lg transition-colors">
            Sign In
        </button>
    </form>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("passwordInput");
    const icon  = document.getElementById("eyeIcon");
    if (input.type === "password") {
        input.type = "text";
        icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                     m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                     m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7
                     a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
    } else {
        input.type = "password";
        icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943
                     9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    }
}
</script>
</body>
</html>
